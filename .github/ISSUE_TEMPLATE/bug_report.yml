name: Bug report
description: Report something that is broken or surprising.
title: "Bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: List the smallest set of steps needed to reproduce the issue.
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: "20.11.0"
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Logs, screenshots, or configuration notes. Do not paste bot tokens.
